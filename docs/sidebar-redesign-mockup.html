<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIT SCS V2 — Sidebar Redesign Proposal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0a1628; color: #fff; display: flex; min-height: 100vh; }

  /* Layout */
  .container { display: flex; width: 100%; }
  .sidebar-wrap { display: flex; gap: 32px; padding: 24px; }
  .sidebar-column { display: flex; flex-direction: column; gap: 12px; }
  .sidebar-column h2 { font-size: 14px; font-weight: 600; color: #80D1E9; text-transform: uppercase; letter-spacing: 1px; text-align: center; }

  /* Sidebar shell */
  .sidebar {
    width: 260px;
    background: rgba(5,16,32,0.95);
    backdrop-filter: blur(24px);
    border-right: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    border-radius: 16px;
    overflow: hidden;
    height: 720px;
  }

  /* Logo area */
  .logo-area {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #2E3192, #80D1E9);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px; color: #fff;
  }
  .logo-text { font-size: 14px; font-weight: 600; }
  .logo-sub { font-size: 10px; color: #9ca3af; }

  /* Search */
  .search-bar {
    margin: 8px 12px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    color: #6b7280;
    font-size: 13px;
    cursor: pointer;
  }
  .search-bar:hover { background: rgba(255,255,255,0.08); }
  .search-kbd {
    margin-left: auto;
    font-size: 10px;
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    color: #9ca3af;
  }

  /* Nav sections */
  .nav-content {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .nav-content::-webkit-scrollbar { width: 4px; }
  .nav-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .nav-section { margin-bottom: 4px; }
  .section-header {
    padding: 8px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 16px;
    font-size: 13px;
    color: #d1d5db;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .nav-item.active {
    background: rgba(46,49,146,0.3);
    color: #80D1E9;
    border-left: 3px solid #80D1E9;
    padding-left: 13px;
  }
  .nav-item .icon {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.7;
  }
  .nav-item:hover .icon { opacity: 1; }
  .nav-item.active .icon { opacity: 1; }

  .badge {
    margin-left: auto;
    background: #ef4444;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    min-width: 18px;
    text-align: center;
  }
  .badge.info { background: #2E3192; }

  /* User footer */
  .user-footer {
    padding: 12px 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .user-avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #2E3192, #80D1E9);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
  }
  .user-name { font-size: 13px; font-weight: 500; }
  .user-role { font-size: 10px; color: #9ca3af; }

  /* Old sidebar styles */
  .old-sidebar .nav-item { padding-left: 20px; }
  .old-sidebar .nav-group-title {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
  }
  .old-sidebar .nav-group-title .icon { opacity: 0.7; }
  .old-sidebar .nav-child {
    padding: 5px 16px 5px 42px;
    font-size: 12px;
    color: #9ca3af;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .old-sidebar .nav-child:hover { color: #d1d5db; background: rgba(255,255,255,0.03); }
  .old-sidebar .dot { width: 4px; height: 4px; background: #6b7280; border-radius: 50%; }

  /* Info panel */
  .info-panel {
    flex: 1;
    padding: 32px;
    max-width: 600px;
    overflow-y: auto;
  }
  .info-panel h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .info-panel .subtitle { color: #9ca3af; font-size: 14px; margin-bottom: 24px; }

  .change-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .change-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .change-card p { font-size: 13px; color: #9ca3af; line-height: 1.5; }
  .change-num {
    width: 22px; height: 22px;
    background: #2E3192;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Role switcher */
  .role-switcher {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .role-btn {
    padding: 6px 12px;
    font-size: 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: transparent;
    color: #9ca3af;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .role-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .role-btn.active { background: #2E3192; border-color: #2E3192; color: #fff; }
</style>
</head>

// ── RENDER ───────────────────────────────────────────────────────────────

var currentNewRole = 'ADMIN';
var currentOldRole = 'ADMIN';

function renderNewSidebar(role) {
  var container = document.getElementById('new-sidebar');
  while (container.firstChild) container.removeChild(container.firstChild);

  // Logo
  var logoArea = document.createElement('div');
  logoArea.className = 'logo-area';
  var logoIcon = document.createElement('div');
  logoIcon.className = 'logo-icon';
  logoIcon.textContent = 'N';
  var logoTextWrap = document.createElement('div');
  var logoText = document.createElement('div');
  logoText.className = 'logo-text';
  logoText.textContent = 'NIT SCS';
  var logoSub = document.createElement('div');
  logoSub.className = 'logo-sub';
  logoSub.textContent = 'Supply Chain V2';
  logoTextWrap.appendChild(logoText);
  logoTextWrap.appendChild(logoSub);
  logoArea.appendChild(logoIcon);
  logoArea.appendChild(logoTextWrap);
  container.appendChild(logoArea);

  // Search
  var searchBar = document.createElement('div');
  searchBar.className = 'search-bar';
  searchBar.appendChild(makeIcon('search'));
  var searchText = document.createElement('span');
  searchText.textContent = 'Search...';
  searchBar.appendChild(searchText);
  var kbd = document.createElement('span');
  kbd.className = 'search-kbd';
  kbd.textContent = '\u2318K';
  searchBar.appendChild(kbd);
  container.appendChild(searchBar);

  // Nav content
  var navContent = document.createElement('div');
  navContent.className = 'nav-content';

  var sections = NEW_NAV[role] || NEW_NAV['ADMIN'];
  for (var s = 0; s < sections.length; s++) {
    var sec = sections[s];
    var sectionDiv = document.createElement('div');
    sectionDiv.className = 'nav-section';

    var header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = sec.section;
    sectionDiv.appendChild(header);

    for (var i = 0; i < sec.items.length; i++) {
      var item = sec.items[i];
      var navItem = document.createElement('div');
      navItem.className = 'nav-item' + (item.active ? ' active' : '');

      var iconWrap = document.createElement('span');
      iconWrap.className = 'icon';
      iconWrap.appendChild(makeIcon(item.icon));
      navItem.appendChild(iconWrap);

      var label = document.createElement('span');
      label.textContent = item.label;
      navItem.appendChild(label);

      if (item.badge) {
        var badge = document.createElement('span');
        badge.className = 'badge' + (item.badgeType === 'info' ? ' info' : '');
        badge.textContent = item.badge;
        navItem.appendChild(badge);
      }

      sectionDiv.appendChild(navItem);
    }
    navContent.appendChild(sectionDiv);
  }
  container.appendChild(navContent);

  // User footer
  var footer = document.createElement('div');
  footer.className = 'user-footer';
  var avatar = document.createElement('div');
  avatar.className = 'user-avatar';
  avatar.textContent = 'AH';
  var userInfo = document.createElement('div');
  var userName = document.createElement('div');
  userName.className = 'user-name';
  userName.textContent = 'Abdulrahman';
  var userRole = document.createElement('div');
  userRole.className = 'user-role';
  userRole.textContent = role.replace('_', ' ');
  userInfo.appendChild(userName);
  userInfo.appendChild(userRole);
  footer.appendChild(avatar);
  footer.appendChild(userInfo);
  container.appendChild(footer);
}

function renderOldSidebar(role) {
  var container = document.getElementById('old-sidebar');
  while (container.firstChild) container.removeChild(container.firstChild);

  // Logo (old — taller)
  var logoArea = document.createElement('div');
  logoArea.className = 'logo-area';
  logoArea.style.padding = '20px 16px';
  var logoIcon = document.createElement('div');
  logoIcon.className = 'logo-icon';
  logoIcon.style.width = '40px';
  logoIcon.style.height = '40px';
  logoIcon.textContent = 'N';
  var logoTextWrap = document.createElement('div');
  var logoText = document.createElement('div');
  logoText.className = 'logo-text';
  logoText.textContent = 'Nesma IT SCS';
  var logoSub = document.createElement('div');
  logoSub.className = 'logo-sub';
  logoSub.textContent = 'V2 - Supply Chain';
  logoTextWrap.appendChild(logoText);
  logoTextWrap.appendChild(logoSub);
  logoArea.appendChild(logoIcon);
  logoArea.appendChild(logoTextWrap);
  container.appendChild(logoArea);

  // Nav content
  var navContent = document.createElement('div');
  navContent.className = 'nav-content';

  var groups = OLD_NAV[role] || OLD_NAV['ADMIN'];
  for (var g = 0; g < groups.length; g++) {
    var group = groups[g];
    var groupTitle = document.createElement('div');
    groupTitle.className = 'nav-group-title';
    var iconWrap = document.createElement('span');
    iconWrap.className = 'icon';
    iconWrap.appendChild(makeIcon(group.icon));
    groupTitle.appendChild(iconWrap);
    var titleText = document.createElement('span');
    titleText.textContent = group.group;
    groupTitle.appendChild(titleText);
    navContent.appendChild(groupTitle);

    for (var c = 0; c < group.children.length; c++) {
      var child = document.createElement('div');
      child.className = 'nav-child';
      var dot = document.createElement('span');
      dot.className = 'dot';
      child.appendChild(dot);
      var childText = document.createElement('span');
      childText.textContent = group.children[c];
      child.appendChild(childText);
      navContent.appendChild(child);
    }
  }
  container.appendChild(navContent);

  // Old footer — raw role select
  var footer = document.createElement('div');
  footer.className = 'user-footer';
  footer.style.flexDirection = 'column';
  footer.style.gap = '4px';
  var footerLabel = document.createElement('div');
  footerLabel.style.fontSize = '10px';
  footerLabel.style.color = '#6b7280';
  footerLabel.textContent = 'Switch Role';
  var sel = document.createElement('select');
  sel.style.cssText = 'background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#fff;padding:6px 8px;font-size:12px;width:100%;font-family:inherit;';
  var roles = ['Admin', 'WH Supervisor', 'WH Staff', 'Logistics', 'QC Officer', 'Engineer', 'Manager'];
  for (var r = 0; r < roles.length; r++) {
    var opt = document.createElement('option');
    opt.textContent = roles[r];
    sel.appendChild(opt);
  }
  footer.appendChild(footerLabel);
  footer.appendChild(sel);
  container.appendChild(footer);
}

function renderInfoPanel() {
  var panel = document.getElementById('info-panel');
  while (panel.firstChild) panel.removeChild(panel.firstChild);

  var h1 = document.createElement('h1');
  h1.textContent = 'Sidebar Redesign Proposal';
  panel.appendChild(h1);

  var sub = document.createElement('div');
  sub.className = 'subtitle';
  sub.textContent = 'NIT Supply Chain V2 \u2014 Comparing proposed vs current navigation';
  panel.appendChild(sub);

  // Role switcher
  var switcherLabel = document.createElement('div');
  switcherLabel.style.cssText = 'font-size:12px;color:#6b7280;margin-bottom:6px;';
  switcherLabel.textContent = 'Switch role to compare:';
  panel.appendChild(switcherLabel);

  var switcher = document.createElement('div');
  switcher.className = 'role-switcher';
  var roleNames = ['ADMIN', 'WAREHOUSE', 'LOGISTICS', 'QC', 'ENGINEER', 'MANAGER'];
  for (var i = 0; i < roleNames.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'role-btn' + (roleNames[i] === currentNewRole ? ' active' : '');
    btn.textContent = roleNames[i];
    btn.setAttribute('data-role', roleNames[i]);
    btn.addEventListener('click', function() {
      var role = this.getAttribute('data-role');
      currentNewRole = role;
      renderNewSidebar(role);
      var oldRole = (OLD_NAV[role]) ? role : 'ADMIN';
      renderOldSidebar(oldRole);
      renderInfoPanel();
    });
    switcher.appendChild(btn);
  }
  panel.appendChild(switcher);

  // Changes
  var changes = [
    { title: 'Domain-based section grouping', desc: '8 flat-labeled sections with uppercase headers instead of 10 expandable dropdown groups. Items are grouped by business domain (Operations, Quality, Inventory, etc.) for faster scanning.' },
    { title: 'Icons on every item', desc: 'Every nav item has its own icon, not just top-level groups. This improves scannability and helps users find items by visual pattern, not just text.' },
    { title: 'Section headers (not nested dropdowns)', desc: 'Replace collapsible groups with always-visible section headers. Users see all items at once without clicking to expand. Reduces clicks-to-target by 1.' },
    { title: 'Quick search (\u2318K)', desc: 'Searchable command palette at the top of the sidebar. For 30+ nav items, search is faster than scrolling. Common in enterprise SaaS (Notion, Linear, GitHub).' },
    { title: 'Notification badges', desc: 'Red/blue count badges on items needing attention (Pending Approvals: 5, Job Orders: 3, Expiry Alerts: 12). Pulls users toward action items without a separate notification page.' },
    { title: 'Compact logo area', desc: 'Reduced from h-24 (96px) to h-16 (64px). Reclaims vertical space for navigation, especially important on laptop screens (768px viewport).' },
    { title: 'Proper user footer', desc: 'Avatar + name + role display instead of raw <select> dropdown. Role switching moves to Settings page (admin-only). Cleaner, more professional.' },
  ];

  for (var c = 0; c < changes.length; c++) {
    var card = document.createElement('div');
    card.className = 'change-card';
    var h3 = document.createElement('h3');
    var num = document.createElement('span');
    num.className = 'change-num';
    num.textContent = String(c + 1);
    h3.appendChild(num);
    var titleSpan = document.createElement('span');
    titleSpan.textContent = ' ' + changes[c].title;
    h3.appendChild(titleSpan);
    var p = document.createElement('p');
    p.textContent = changes[c].desc;
    card.appendChild(h3);
    card.appendChild(p);
    panel.appendChild(card);
  }
}

// Initial render
renderNewSidebar('ADMIN');
renderOldSidebar('ADMIN');
renderInfoPanel();
</script>
